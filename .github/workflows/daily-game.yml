# Selección diaria: 1 canción para el juego del día siguiente (visible a las 00:00 Madrid).
# Ejecuta cada día a las 22:00 hora española (crea el juego del día siguiente).
# Nota: GitHub Actions solo usa UTC. 21:00 UTC = 22:00 CET (oct-mar) / 23:00 CEST (abr-sep).
name: Daily Game

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  select:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-ingest.txt

      - name: Run daily game selection
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/select-daily-game.py
