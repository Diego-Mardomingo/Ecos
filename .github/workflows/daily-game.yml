# Selección diaria: 1 canción para el juego de hoy (visible a las 16:00 Madrid).
# Ejecuta cada día a las 14:00 hora española.
# Nota: GitHub Actions solo usa UTC. 13:00 UTC = 14:00 CET (oct-mar) / 15:00 CEST (abr-sep).
name: Daily Game

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  select:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-ingest.txt

      - name: Run daily game selection
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/select-daily-game.py
