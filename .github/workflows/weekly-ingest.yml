# Ingesta semanal: scrape 25 canciones/playlist + selección 7 juegos.
# Ejecuta cada lunes a las 06:00 UTC.
name: Weekly Ingest

on:
  schedule:
    # Lunes 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-ingest.txt

      - name: Run weekly ingest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/ingest-weekly.py
