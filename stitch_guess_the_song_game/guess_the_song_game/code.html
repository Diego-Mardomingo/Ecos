<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Guess the Song Game</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee79",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102217",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center">
<!-- Mobile Container -->
<div class="relative flex flex-col h-full w-full max-w-md min-h-screen overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Header / Navigation -->
<div class="flex items-center justify-between p-4 pt-6 pb-2">
<button class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Daily Challenge #42</h2>
<button class="flex items-center justify-center rounded-full px-3 py-1 text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors">
                Skip
            </button>
</div>
<!-- Album Art / Visualizer Placeholder -->
<div class="flex-1 flex flex-col items-center justify-center p-6 relative">
<!-- Decorative blurred background blob -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>
<!-- Main Visual -->
<div class="relative z-10 w-64 h-64 rounded-xl shadow-xl overflow-hidden bg-gradient-to-br from-slate-200 to-slate-100 dark:from-slate-800 dark:to-slate-900 flex items-center justify-center group" data-alt="Abstract musical sound wave visualization with vibrant colors">
<!-- Placeholder for unknown song -->
<span class="material-symbols-outlined text-6xl text-slate-400 dark:text-slate-600 animate-pulse">music_note</span>
<!-- Countdown Overlay -->
<div class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-[2px]">
<div class="flex flex-col items-center gap-1">
<span class="text-4xl font-black text-white drop-shadow-md">00:14</span>
<span class="text-xs uppercase tracking-widest text-white/80 font-medium">Remaining</span>
</div>
</div>
</div>
<!-- Hints Section -->
<div class="flex gap-3 mt-8 w-full justify-center">
<button class="flex items-center gap-2 px-4 py-2 rounded-full bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 shadow-sm text-xs font-semibold hover:bg-slate-50 dark:hover:bg-white/10 transition">
<span class="material-symbols-outlined text-lg text-primary">lightbulb</span>
                    Hint (2)
                </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-full bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 shadow-sm text-xs font-semibold hover:bg-slate-50 dark:hover:bg-white/10 transition">
<span class="material-symbols-outlined text-lg text-primary">group</span>
                    Ask Friends
                </button>
</div>
</div>
<!-- Player Controls & Input -->
<div class="flex flex-col gap-6 p-6 pb-8 bg-white dark:bg-[#152a1e] rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] dark:shadow-none border-t border-slate-100 dark:border-white/5">
<!-- Progress Bar -->
<div class="flex flex-col gap-2 w-full">
<div class="flex justify-between items-end px-1">
<span class="text-xs font-medium text-primary animate-pulse">Listening...</span>
<span class="text-xs font-medium text-slate-400 dark:text-slate-500">0:14 / 0:30</span>
</div>
<div class="relative h-3 w-full rounded-full bg-slate-100 dark:bg-black/20 overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full" style="width: 45%;"></div>
</div>
</div>
<!-- Play Button -->
<div class="flex justify-center -mt-2">
<button class="group flex h-16 w-16 items-center justify-center rounded-full bg-primary text-slate-900 shadow-lg shadow-primary/30 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl fill-current ml-1">play_arrow</span>
</button>
</div>
<!-- Guess Input -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400">search</span>
</div>
<input class="w-full bg-slate-50 dark:bg-black/20 border-none rounded-xl py-4 pl-12 pr-4 text-base font-medium placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none text-slate-900 dark:text-white shadow-inner" placeholder="Type song or artist name..." type="text"/>
</div>
<!-- Keyboard spacer (visual only) -->
<div class="h-4"></div>
</div>
<!-- Bottom Navigation -->
<div class="flex border-t border-slate-200 dark:border-[#234832] bg-white dark:bg-[#193324] px-6 pb-6 pt-2 justify-between items-center">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary group" href="#">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform fill-current">music_note</span>
<span class="text-[10px] font-bold">Daily</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-[#92c9a8] group hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">trophy</span>
<span class="text-[10px] font-medium">Leaderboard</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-[#92c9a8] group hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">bar_chart</span>
<span class="text-[10px] font-medium">Stats</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-[#92c9a8] group hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</div>
<!-- Decorative background blobs for the main page body (outside phone view) -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none opacity-50 dark:opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/30 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-500/20 rounded-full blur-[100px]"></div>
</div>
</body></html>
